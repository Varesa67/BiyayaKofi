<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Biyaya Kofi — Menu</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    .product-modal { display:none; position:fixed; inset:0; align-items:center; justify-content:center; background:rgba(0,0,0,.5); z-index:2000; }
    .product-modal.show { display:flex; }
    .modal-inner { background:#fff;border-radius:12px;padding:18px;max-width:920px;width:96%; animation:pop .22s ease; box-shadow:0 30px 80px rgba(0,0,0,0.2); }
    @keyframes pop { from { transform:translateY(8px) scale(.98); opacity:0 } to { transform:none; opacity:1 } }
    .page-exit { opacity: .0; transform: translateY(8px); transition: opacity .36s ease, transform .36s ease; }
    .menu-item img { transition: transform .4s cubic-bezier(.2,.9,.2,1); }
    .menu-item:hover img { transform: scale(1.06) rotate(-0.5deg); }
    .nav-anim { position:relative; overflow:hidden; }
    .nav-anim::after { content:""; position:absolute; inset:0; background: linear-gradient(90deg, rgba(255,255,255,0.02), rgba(255,255,255,0)); opacity:0; transform: translateX(-10%); transition:opacity .28s, transform .42s; z-index:0; pointer-events:none; }
    .nav-anim:active::after { opacity:1; transform:none; }
    .nav-link:focus { outline:3px solid rgba(176,138,88,0.22); outline-offset:4px; border-radius:8px; }
    .header-controls {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .search-input {
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid #e6e1dd;
      font-size: 0.85rem;
      width: 200px; 
      outline: none;
      transition: all 0.3s ease;
      background-color: #fff;
    }

    .search-input:focus {
      width: 250px; 
      border-color: var(--accent);
      box-shadow: 0 0 8px rgba(176,138,88,0.15);
    }

    .pagination-wrap {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-top: 30px;
      padding-bottom: 40px;
      width: 100%;
    }

    #addressContainer { display: none; grid-column: 1/3; }
    .receipt-btn { background: #27ae60 !important; color: white !important; margin-top: 10px; width: 100%; }
  </style>
</head>
<body>

  <header class="site-header" role="banner">
    <div class="header-inner container">
      <a class="brand" href="home.html" aria-label="Biyaya Kofi home">
        <img src="photos/biyaya kofi.jpg" alt="Biyaya Kofi logo">
        <div><h1>Biyaya Kofi</h1><div class="small-muted">Order • Pickup • Delivery</div></div>
      </a>

      <nav class="main-nav" role="navigation" aria-label="Main">
        <div class="nav-list">
          <a class="nav-link nav-anim" href="index.html">Home</a>
          <a class="nav-link nav-anim active" href="menu.html">Menu</a>
          <a class="nav-link nav-anim" href="about.html">About</a>
          <a class="nav-link nav-anim" href="contact.html">Contact</a>
        </div>

        <div class="header-controls">
          <input class="search-input" id="searchInput" placeholder="Search items, e.g. matcha, waffle" aria-label="Search menu">
          <div class="cart-icon" id="openCartTop" role="button" aria-label="Open cart">🛒 <span class="cart-count" id="cartCountTop">0</span></div>
          <div class="hamburger" id="hamb">☰</div>
        </div>
      </nav>
    </div>
  </header>

  <main class="container layout" id="mainLayout" style="gap:22px;">

    <aside class="sidebar" aria-label="Filters">
      <h4>Categories</h4>
      <div class="cat-list" id="categoryList"></div>

      <div style="margin-top:14px">
        <h4>Sort</h4>
        <select id="sortSelect" style="width:100%;padding:10px;border-radius:10px;border:1px solid #e6e1dd">
          <option value="popular">Popular</option>
          <option value="price-low">Price: low to high</option>
          <option value="price-high">Price: high to low</option>
          <option value="alpha">A → Z</option>
        </select>
      </div>

      <div style="margin-top:18px">
        <h4>Quick Actions</h4>
        <div style="display:flex;gap:8px">
          <button id="openCartBtn" class="btn" style="flex:1">Open Cart</button>
          <button id="clearCartBtn" class="btn alt" style="flex:1">Clear</button>
        </div>
      </div>
    </aside>

    <section style="min-height:400px; flex:1">
      <h3 id="menu-top" style="margin-bottom:4px">Complete Menu</h3>
      <p class="small-muted" style="margin-bottom:16px">Tap Add to add an item. Click image for details.</p>

      <div id="menuList" class="menu-list" aria-live="polite"></div>
    </section>
  </main>

  <div class="product-modal" id="productModal" role="dialog" aria-hidden="true">
    <div class="modal-inner" id="productModalInner" role="document">
      <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap">
        <img id="pmImg" src="" alt="" style="width:340px;height:220px;object-fit:contain;border-radius:10px;background:#f8f5f2;">
        <div style="flex:1">
          <h2 id="pmTitle"></h2>
          <div class="small-muted" id="pmCat"></div>
          <p id="pmDesc" style="margin-top:12px"></p>
          
          <div id="pmSizeContainer" style="display:none; margin-top:14px; padding:12px; background:rgba(0,0,0,0.03); border-radius:10px;">
            <div class="small-muted" style="margin-bottom:8px; font-weight:700">Size Options</div>
            <div style="display:flex; flex-direction:column; gap:8px">
              <label style="display:flex; justify-content:space-between; cursor:pointer; align-items:center">
                <div><input type="radio" name="pmSize" value="Small" checked style="margin-right:6px"> Small (12oz)</div>
                <div class="small-muted">+₱0</div>
              </label>
              <label style="display:flex; justify-content:space-between; cursor:pointer; align-items:center">
                <div><input type="radio" name="pmSize" value="Medium" style="margin-right:6px"> Medium (16oz)</div>
                <div class="small-muted">+₱67</div>
              </label>
              <label style="display:flex; justify-content:space-between; cursor:pointer; align-items:center">
                <div><input type="radio" name="pmSize" value="Large" style="margin-right:6px"> Large (22oz)</div>
                <div class="small-muted">+₱134</div>
              </label>
            </div>
          </div>

          <div style="display:flex;align-items:center;gap:16px;margin-top:14px">
            <div class="kv" id="pmPrice"></div>
            <div style="flex:1"></div>
            <div style="display:flex;gap:8px;align-items:center">
              <button class="btn alt" id="pmDec">-</button>
              <div id="pmQty" style="min-width:28px;text-align:center">1</div>
              <button class="btn alt" id="pmInc">+</button>
              <button id="pmAdd" class="btn">Add to cart</button>
            </div>
          </div>
        </div>
      </div>
      <div style="text-align:right;margin-top:12px"><button id="pmClose" class="btn alt">Close</button></div>
    </div>
  </div>

  <aside class="cart-drawer" id="cartDrawer" aria-hidden="true">
    <div class="cart-head">
      <div><strong>Your Order</strong><div class="small-muted">Ready to checkout?</div></div>
      <div style="display:flex;gap:8px;align-items:center">
        <button id="clearCart" class="btn alt">Clear</button>
        <button id="closeCart" style="background:transparent;border:0;font-size:22px;cursor:pointer">✕</button>
      </div>
    </div>
    <div class="cart-body" id="cartBody"></div>
    <div class="cart-footer">
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><div class="small-muted">Subtotal</div><div id="subTotal">₱0.00</div></div>
      <div style="display:flex;justify-content:space-between;margin-bottom:8px"><div class="small-muted">Delivery</div><div id="delFee">₱0.00</div></div>
      <div style="display:flex;justify-content:space-between;font-weight:700"><div>Total</div><div id="grandTotal">₱0.00</div></div>
      <div style="margin-top:10px;display:flex;gap:8px">
        <button id="checkoutBtn" class="btn" style="flex:1">Checkout</button>
        <button id="continueBtn" class="btn alt" style="flex:1">Continue</button>
      </div>
    </div>
  </aside>

  <div class="modal" id="checkoutModal" aria-hidden="true">
    <div class="modal-card">
      <h3>Checkout</h3>
      <form id="checkoutForm" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px">
        <input type="text" id="custName" placeholder="Full name" required style="padding:10px;border-radius:8px;border:1px solid #e6e1dd"/>
        <input type="tel" id="custPhone" placeholder="Phone number" required style="padding:10px;border-radius:8px;border:1px solid #e6e1dd"/>
        
        <select id="fulfillment" style="padding:10px;border-radius:8px;border:1px solid #e6e1dd">
          <option value="pickup">Pickup — Free</option>
          <option value="delivery">Delivery — ₱50</option>
        </select>
        
        <select id="paymentMethod" required style="padding:10px;border-radius:8px;border:1px solid #e6e1dd">
          <option value="" disabled selected>Payment Method</option>
          <option value="GCash">GCash</option>
          <option value="Maya">Maya</option>
          <option value="Credit Card">Credit / Debit Card</option>
          <option value="Cash">Cash (on Delivery/Pickup)</option>
        </select>

        <div id="addressContainer">
          <textarea id="custAddress" placeholder="Enter Full Delivery Address" style="width:100%;padding:10px;border-radius:8px;border:1px solid #e6e1dd"></textarea>
        </div>

        <input type="email" id="custEmail" placeholder="Email Address" required style="grid-column:1/3;padding:10px;border-radius:8px;border:1px solid #e6e1dd"/>
        <textarea id="custNotes" placeholder="Notes (optional)" style="grid-column:1/3;padding:10px;border-radius:8px;border:1px solid #e6e1dd"></textarea>
        
        <div style="grid-column:1/3;display:flex;gap:8px">
          <button class="btn" style="flex:1" type="submit">Place order</button>
          <button class="btn alt" style="flex:1" type="button" id="cancelCheckout">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <div class="modal" id="successModal" aria-hidden="true">
    <div class="modal-card" style="text-align: center;">
      <h3>Order Confirmed 🎉</h3>
      <p id="successText" class="small-muted"></p>
      <button id="downloadReceiptBtn" class="btn receipt-btn">Download Receipt</button>
      <button id="doneBtn" class="btn alt" style="margin-top:12px; width:100%">Done</button>
    </div>
  </div>

  <script>
    const MENU = [
      {id:'dirty-matcha', title:'Dirty Matcha Latte', price:195, cat:'Matcha Series', img:'photos/BDML.jfif', desc:'Experience the harmonious blend of earthy matcha and creamy milk.'},
      {id:'biscoff-latte', title:'Biscoff Latte', price:190, cat:'Popular', img:'photos/BLB.jpg', desc:'Indulgent latte flavored with Biscoff cookie spread.'},
      {id:'americano', title:'Americano', price:180, cat:'Hot/Iced', img:'photos/AM.jpg', desc:'Bold and rich coffee with a smooth finish.'},
      {id:'cappuccino', title:'Cappuccino', price:180, cat:'Hot/Iced', img:'photos/BSLATTE.jfif', desc:'Espresso with silky steamed milk.'},
      {id:'latte', title:'Latte', price:180, cat:'Hot/Iced', img:'photos/ol.jfif', desc:'Smooth espresso and milk.'},
      {id:'caramel-macchiato', title:'Caramel Macchiato', price:180, cat:'Hot/Iced', img:'photos/pistachio.jfif', desc:'Espresso, milk, caramel drizzle.'},
      {id:'white-mocha', title:'White Mocha', price:180, cat:'Hot/Iced', img:'photos/VM.jfif', desc:'Creamy white chocolate & espresso.'},
      {id:'mocha', title:'Mocha', price:180, cat:'Hot/Iced', img:'photos/NNC.jfif', desc:'Coffee and chocolate in harmony.'},
      {id:'salted-caramel', title:'Salted Caramel Latte', price:180, cat:'Hot/Iced', img:'photos/NL.jfif', desc:'Sweet and salty caramel notes.'},
      {id:'honey-lemon', title:'Honey Lemon Long Black', price:180, cat:'Hot/Iced', img:'photos/CMA.jfif', desc:'Coffee with honey and a citrus twist.'},
      {id:'hazelnut-mocha', title:'Hazelnut Mocha', price:180, cat:'Hot/Iced', img:'photos/CCB.jfif', desc:'Nutty and chocolatey.'},
      {id:'spanish-latte', title:'Spanish Latte', price:180, cat:'Hot/Iced', img:'photos/SCL.jfif', desc:'Espresso and condensed milk fusion.'},
      {id:'butterscotch', title:'Butterscotch Latte', price:180, cat:'Hot/Iced', img:'photos/PS.jfif', desc:'Buttery sweet comfort.'},
      {id:'oreo-latte', title:'Oreo Latte', price:169, cat:'Hot/Iced', img:'photos/oreolat.jfif', desc:'Latte with Oreo crunch flair.'},
      {id:'coke-amer', title:'Coke Americano', price:169, cat:'Hot/Iced', img:'photos/mocha.jfif', desc:'An adventurous fizzy coffee mix.'},
      {id:'biscoff-frappe', title:'Biscoff Frappe', price:189, cat:'Frappe', img:'photos/BBLEND.jfif', desc:'Blended Biscoff frappe.'},
      {id:'biyaya-frappe', title:'Biyaya Frappe', price:210, cat:'Frappe', img:'photos/CA.jfif', desc:'Creamy house frappe.'},
      {id:'nutella-latte', title:'Nutella Latte', price:190, cat:'Specialty', img:'photos/Latte.jfif', desc:'Nutella sweetness in a cup.'},
      {id:'biyaya-blend', title:'Biyaya Blend', price:205, cat:'Specialty', img:'photos/bsf.jfif', desc:'House signature blend.'},
      {id:'charcoal-latte', title:'Charcoal Latte', price:190, cat:'Specialty', img:'photos/COLATTE.jfif', desc:'A unique charcoal latte.'},
      {id:'brown-sugar', title:'Brown Sugar Latte', price:190, cat:'Specialty', img:'photos/CL.jfif', desc:'Caramelized brown sugar notes.'},
      {id:'orange-amer', title:'Orange Americano', price:190, cat:'Specialty', img:'photos/BSL.jfif', desc:'Citrus espresso twist.'},
      {id:'pumpkin', title:'Pumpkin Spice', price:189, cat:'Seasonal', img:'photos/CA.jfif', desc:'Seasonal spice — with or without coffee.'},
      {id:'coco-latte', title:'Coco Latte', price:179, cat:'Specialty', img:'photos/BSLATTE.jfif', desc:'Tropical coconut & espresso.'},
      {id:'signature-choco', title:'Signature Choco', price:180, cat:'Non-coffee', img:'photos/pca.jfif', desc:'Our signature chocolate drink.'},
      {id:'vanilla-milk', title:'Vanilla Milk', price:180, cat:'Non-coffee', img:'photos/OA.jfif', desc:'Sweet vanilla milk.'},
      {id:'purple-cake', title:'Purple Cake', price:180, cat:'Dessert', img:'photos/WM.jfif', desc:'Ube-inspired purple cake.'},
      {id:'strawberry-popping', title:'Strawberries Milk With Popping Boba', price:180, cat:'Non-coffee', img:'photos/HLLB.jfif', desc:'Strawberry milk & popping boba.'},
      {id:'biscoff-non', title:'Biscoff Non-coffee', price:180, cat:'Non-coffee', img:'photos/PS.jfif', desc:'Biscoff without coffee.'},
      {id:'nutella-non', title:'Nutella Non-coffee', price:180, cat:'Non-coffee', img:'photos/SL.jfif', desc:'Nutella beverage — no coffee.'},
      {id:'choco-cloud', title:'Choco Cloud Berry', price:169, cat:'Dessert', img:'photos/Cappo.jfif', desc:'Light chocolate & berry.'},
      {id:'oreo-cheesecake', title:'Oreo Cheesecake', price:169, cat:'Dessert', img:'photos/SMWPB.jfif', desc:'Creamy Oreo cheesecake.'},
      {id:'pistachio', title:'Pistachio', price:189, cat:'Non-coffee', img:'photos/HM.jfif', desc:'Nutty pistachio flavor.'},
    ];

    const cats = Array.from(new Set(MENU.map(m => m.cat))).sort();
    const categoryList = document.getElementById('categoryList');
    const menuList = document.getElementById('menuList');
    const searchInput = document.getElementById('searchInput');
    const sortSelect = document.getElementById('sortSelect');
    
    let currentPage = 1;
    const itemsPerPage = 7;
    let currentFilter = 'All';

    const isDrink = (cat) => !['Pastries', 'Dessert', 'Food'].includes(cat);

    function initCategories(){
      categoryList.innerHTML = '';
      const allBtn = document.createElement('button'); allBtn.textContent = 'All'; allBtn.dataset.cat='All';
      allBtn.onclick = ()=> applyFilter('All');
      categoryList.appendChild(allBtn);
      cats.forEach(c=>{
        const b = document.createElement('button'); b.textContent = c; b.dataset.cat=c;
        b.onclick = ()=> applyFilter(c);
        categoryList.appendChild(b);
      });
    }

    function applyFilter(cat){ 
      currentFilter = cat; 
      currentPage = 1; 
      renderMenu(); 
    }

    searchInput.oninput = () => { currentPage = 1; renderMenu(); };
    sortSelect.onchange = () => { currentPage = 1; renderMenu(); };

    function renderMenu(){
      const q = searchInput.value.trim().toLowerCase();
      let list = MENU.filter(item => (currentFilter === 'All' || item.cat === currentFilter));
      if(q) list = list.filter(it => (it.title + ' ' + (it.desc||'')).toLowerCase().includes(q));
      
      const s = sortSelect.value;
      if(s === 'price-low') list.sort((a,b)=>a.price-b.price);
      else if(s === 'price-high') list.sort((a,b)=>b.price-a.price);
      else if(s === 'alpha') list.sort((a,b)=>a.title.localeCompare(b.title));
      
      const totalPages = Math.ceil(list.length / itemsPerPage);
      const startIndex = (currentPage - 1) * itemsPerPage;
      const paginatedItems = list.slice(startIndex, startIndex + itemsPerPage);

      menuList.innerHTML = '';
      paginatedItems.forEach(it=>{
        const drink = isDrink(it.cat);
        let sizeHtml = drink ? `
          <select class="list-size-select" data-id="${it.id}" style="padding:4px 8px; border-radius:6px; border:1px solid #e6e1dd; font-size:0.85rem;">
            <option value="Small" data-offset="0">Small (12oz)</option>
            <option value="Medium" data-offset="67">Medium (16oz) +₱67</option>
            <option value="Large" data-offset="134">Large (22oz) +₱134</option>
          </select>` : '';

        const r = document.createElement('div'); 
        r.className = 'menu-item fade-up';
        r.innerHTML = `
          <img src="${it.img}" alt="${it.title}" loading="lazy" style="border-radius:8px; object-fit:contain; background:#f8f5f2; cursor:pointer;" onclick="openProductModal('${it.id}')">
          <div class="menu-meta" style="flex:1;">
            <h4 style="cursor:pointer" onclick="openProductModal('${it.id}')">${it.title}</h4>
            <div class="small-muted">${it.cat}</div>
            <p class="small-muted" style="margin-top:8px">${it.desc}</p>
            <div style="display:flex;align-items:center;gap:8px;margin-top:10px;flex-wrap:wrap;">
              <div class="price kv" id="list-price-${it.id}" data-baseprice="${it.price}">₱${it.price}</div>
              <div style="flex:1"></div>
              ${sizeHtml}
              <button class="btn addBtn nav-anim" data-id="${it.id}">Add</button>
            </div>
          </div>`;
        menuList.appendChild(r);
      });

      renderPagination(totalPages);
    }

    function renderPagination(totalPages) {
      const old = document.querySelector('.pagination-wrap');
      if(old) old.remove();
      if(totalPages <= 1) return;

      const wrap = document.createElement('div');
      wrap.className = 'pagination-wrap';

      if(currentPage >= 3) {
        const btn = document.createElement('button'); btn.className = "btn alt"; btn.textContent = "« Back to Start";
        btn.onclick = () => changePage(1); wrap.appendChild(btn);
      }
      if(currentPage > 1) {
        const btn = document.createElement('button'); btn.className = "btn alt"; btn.textContent = "‹ Previous";
        btn.onclick = () => changePage(currentPage - 1); wrap.appendChild(btn);
      }
      if(currentPage < totalPages) {
        const btn = document.createElement('button'); btn.className = "btn"; btn.textContent = "Next ›";
        btn.onclick = () => changePage(currentPage + 1); wrap.appendChild(btn);
      }
      menuList.after(wrap);
    }

    function changePage(p) {
      currentPage = p;
      renderMenu();
      document.getElementById('menu-top').scrollIntoView({behavior: 'smooth'});
    }

    let cart = JSON.parse(localStorage.getItem('bk_cart') || '{}');
    function saveCart(){ localStorage.setItem('bk_cart', JSON.stringify(cart)); updateCartUI(); }

    function updateCartUI(){
      const cartBody = document.getElementById('cartBody');
      cartBody.innerHTML = '';
      const keys = Object.keys(cart);
      if(keys.length === 0) cartBody.innerHTML = '<div class="small-muted">Your cart is empty.</div>';
      else keys.forEach(k=>{
        const it = cart[k];
        const el = document.createElement('div');
        el.style = 'display:flex; gap:8px; align-items:center; padding:10px 0; border-bottom:1px dashed #eee;';
        el.innerHTML = `<img src="${it.img}" style="width:64px;height:64px;object-fit:cover;border-radius:8px">
          <div style="flex:1">
            <div style="display:flex;justify-content:space-between"><strong>${it.title}</strong><div class="small-muted">₱${it.price}</div></div>
            <div style="margin-top:8px;display:flex;justify-content:space-between;align-items:center">
              <div class="qty-controls">
                <button class="btn alt" onclick="updateQty('${k}', -1)">-</button>
                <div style="padding:0 8px">${it.qty}</div>
                <button class="btn alt" onclick="updateQty('${k}', 1)">+</button>
              </div>
              <button class="btn alt" onclick="removeItem('${k}')">Remove</button>
            </div>
          </div>`;
        cartBody.appendChild(el);
      });
      const sub = Object.values(cart).reduce((s,i)=>s + i.price * i.qty, 0);
      const del = (document.getElementById('fulfillment')?.value === 'delivery' && sub>0) ? 50 : 0;
      document.getElementById('subTotal').textContent = '₱' + sub.toFixed(2);
      document.getElementById('delFee').textContent = '₱' + del.toFixed(2);
      document.getElementById('grandTotal').textContent = '₱' + (sub+del).toFixed(2);
      document.getElementById('cartCountTop').textContent = Object.values(cart).reduce((s,i)=>s+i.qty, 0);
    }

    function updateQty(id, d){ cart[id].qty += d; if(cart[id].qty<=0) delete cart[id]; saveCart(); }
    function removeItem(id){ delete cart[id]; saveCart(); }

    document.body.onclick = (e) => {
      const add = e.target.closest('.addBtn');
      if(add){
        const id = add.dataset.id; const p = MENU.find(m=>m.id===id);
        const drk = isDrink(p.cat); let sz = 'Small', off = 0;
        if(drk) {
          const s = add.closest('.menu-item').querySelector('.list-size-select');
          sz = s.value; off = parseInt(s.options[s.selectedIndex].dataset.offset);
        }
        const cartId = drk ? `${id}-${sz}` : id;
        if(!cart[cartId]) cart[cartId] = {...p, id:cartId, title: drk ? `${p.title} (${sz})` : p.title, price: p.price+off, qty: 1};
        else cart[cartId].qty++;
        saveCart(); openCart();
      }
    };

    function openCart(){ document.getElementById('cartDrawer').classList.add('open'); updateCartUI(); }
    function closeCart(){ document.getElementById('cartDrawer').classList.remove('open'); }
    document.getElementById('openCartBtn').onclick = openCart;
    document.getElementById('openCartTop').onclick = openCart;
    document.getElementById('closeCart').onclick = closeCart;
    document.getElementById('continueBtn').onclick = closeCart;
    document.getElementById('clearCart').onclick = ()=> { if(confirm('Clear?')){ cart={}; saveCart(); }};
    document.getElementById('clearCartBtn').onclick = ()=> { if(confirm('Clear?')){ cart={}; saveCart(); }};

    document.getElementById('checkoutBtn').onclick = () => { if(Object.keys(cart).length) document.getElementById('checkoutModal').classList.add('show'); };
    document.getElementById('cancelCheckout').onclick = () => document.getElementById('checkoutModal').classList.remove('show');
    
    const fulfillmentField = document.getElementById('fulfillment');
    const addressContainer = document.getElementById('addressContainer');
    const custAddress = document.getElementById('custAddress');

    fulfillmentField.onchange = () => {
      if(fulfillmentField.value === 'delivery') {
        addressContainer.style.display = 'block';
        custAddress.setAttribute('required', 'true');
      } else {
        addressContainer.style.display = 'none';
        custAddress.removeAttribute('required');
      }
      updateCartUI(); 
    };

    let latestOrderInfo = {};

    function generateReceipt() {
      const { name, phone, email, method, address, items, sub, del, total, date } = latestOrderInfo;
      const orderId = 'BK-' + Math.floor(Math.random() * 89999 + 10000);
      
      let rText = `----------------------------------\n`;
      rText += `       BIYAYA KOFI RECEIPT        \n`;
      rText += `----------------------------------\n`;
      rText += `Order ID: ${orderId}\n`;
      rText += `Date: ${date}\n\n`;
      rText += `Customer: ${name}\n`;
      rText += `Contact: ${phone}\n`;
      rText += `Payment: ${method}\n`;
      if(address) rText += `Address: ${address}\n`;
      rText += `----------------------------------\n`;
      rText += `ITEMS:\n`;
      
      items.forEach(it => {
        rText += `${it.qty}x ${it.title.padEnd(20)} P${(it.price * it.qty).toFixed(2)}\n`;
      });

      rText += `----------------------------------\n`;
      rText += `Subtotal:      P${sub.toFixed(2)}\n`;
      rText += `Delivery Fee:  P${del.toFixed(2)}\n`;
      rText += `TOTAL:         P${total.toFixed(2)}\n`;
      rText += `----------------------------------\n`;
      rText += `     Thank you for choosing       \n`;
      rText += `          Biyaya Kofi!            \n`;
      rText += `----------------------------------`;

      const blob = new Blob([rText], { type: 'text/plain' });
      const link = document.createElement('a');
      link.href = URL.createObjectURL(blob);
      link.download = `BiyayaKofi_${orderId}_Receipt.txt`;
      link.click();
    }

    document.getElementById('checkoutForm').onsubmit = (e) => {
      e.preventDefault(); 
      
      const sub = Object.values(cart).reduce((s,i)=>s + i.price * i.qty, 0);
      const del = (fulfillmentField.value === 'delivery') ? 50 : 0;

      // Capture order details for the receipt before clearing cart
      latestOrderInfo = {
        name: document.getElementById('custName').value,
        phone: document.getElementById('custPhone').value,
        email: document.getElementById('custEmail').value,
        method: document.getElementById('paymentMethod').value,
        address: document.getElementById('custAddress').value,
        items: Object.values(cart),
        sub: sub,
        del: del,
        total: sub + del,
        date: new Date().toLocaleString()
      };

      document.getElementById('checkoutModal').classList.remove('show');
      document.getElementById('successText').textContent = `Order successful for ${latestOrderInfo.name}! Preparing your items now.`;
      document.getElementById('successModal').classList.add('show');
      
      cart={}; saveCart();
    };

    document.getElementById('downloadReceiptBtn').onclick = generateReceipt;
    document.getElementById('doneBtn').onclick = () => { document.getElementById('successModal').classList.remove('show'); closeCart(); };

    let curMod = null, curQty = 1;
    function openProductModal(id){
      curMod = MENU.find(m=>m.id===id); curQty = 1;
      const drk = isDrink(curMod.cat);
      document.getElementById('pmImg').src = curMod.img;
      document.getElementById('pmTitle').textContent = curMod.title;
      document.getElementById('pmCat').textContent = curMod.cat;
      document.getElementById('pmDesc').textContent = curMod.desc;
      document.getElementById('pmQty').textContent = curQty;
      document.getElementById('pmSizeContainer').style.display = drk ? 'block' : 'none';
      document.getElementById('pmPrice').textContent = '₱' + curMod.price;
      document.getElementById('productModal').classList.add('show');
    }
    document.getElementById('pmClose').onclick = () => document.getElementById('productModal').classList.remove('show');
    document.getElementById('pmInc').onclick = () => { curQty++; document.getElementById('pmQty').textContent = curQty; };
    document.getElementById('pmDec').onclick = () => { if(curQty>1) {curQty--; document.getElementById('pmQty').textContent = curQty;} };
    document.getElementById('pmAdd').onclick = () => {
      const drk = isDrink(curMod.cat);
      const sz = drk ? document.querySelector('input[name="pmSize"]:checked').value : '';
      let off = 0; if(sz==='Medium') off=67; if(sz==='Large') off=134;
      const cid = drk ? `${curMod.id}-${sz}` : curMod.id;
      if(!cart[cid]) cart[cid] = {...curMod, id:cid, title: drk ? `${curMod.title} (${sz})` : curMod.title, price: curMod.price+off, qty: curQty};
      else cart[cid].qty += curQty;
      saveCart(); document.getElementById('productModal').classList.remove('show'); openCart();
    };

    initCategories(); renderMenu(); updateCartUI();
  </script>
</body>
</html>
